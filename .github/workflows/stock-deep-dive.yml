name: Stock Deep Dive

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Stock ticker symbol (e.g. NVDA, MSFT, AAPL)"
        required: true
      stock_name:
        description: "Company name (e.g. NVIDIA, Microsoft, Apple)"
        required: true

jobs:
  run-deep-dive:
    name: Run Stock Deep Dive
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Load and parameterise deep-dive prompt
        run: |
          {
            echo "DEEP_DIVE_PROMPT<<PROMPT_EOF"
            sed \
              -e "s/{{TICKER}}/${{ github.event.inputs.ticker }}/g" \
              -e "s/{{STOCK_NAME}}/${{ github.event.inputs.stock_name }}/g" \
              prompts/stock-deep-dive-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_ENV"

      - name: Run stock deep dive (one-shot)
        env:
          # GitHub Copilot token
          CopilotDigest__Copilot__Token: ${{ secrets.COPILOT_TOKEN }}
          # Model — gpt-4.1 has strong reasoning for financial analysis
          CopilotDigest__Copilot__Model: ${{ vars.COPILOT_MODEL || 'gpt-4.1' }}
          # Higher token limit for full 9-section report
          CopilotDigest__Copilot__MaxTokens: ${{ vars.COPILOT_MAX_TOKENS || '6000' }}
          # Email / SMTP notification settings
          CopilotDigest__Email__SmtpHost: ${{ secrets.SMTP_HOST }}
          CopilotDigest__Email__SmtpPort: ${{ vars.SMTP_PORT || '587' }}
          CopilotDigest__Email__Username: ${{ secrets.SMTP_USERNAME }}
          CopilotDigest__Email__Password: ${{ secrets.SMTP_PASSWORD }}
          CopilotDigest__Email__FromAddress: ${{ secrets.EMAIL_FROM_ADDRESS }}
          CopilotDigest__Email__ToAddress: ${{ secrets.EMAIL_TO_ADDRESS }}
          # Insider data enabled — SEC EDGAR Form 4 filings for the target stock
          CopilotDigest__InsiderData__Enabled: "true"
          CopilotDigest__InsiderData__MaxFilings: "5"
          CopilotDigest__InsiderData__ContactEmail: ${{ secrets.EMAIL_FROM_ADDRESS }}
          # Single topic: the parameterised deep-dive prompt
          CopilotDigest__Topics__0__Name: "Stock Deep Dive — ${{ github.event.inputs.ticker }}"
          CopilotDigest__Topics__0__Prompt: ${{ env.DEEP_DIVE_PROMPT }}
        run: |
          dotnet run \
            --project src/CopilotDigest/CopilotDigest.csproj \
            --configuration Release \
            --no-build \
            -- --run-once
