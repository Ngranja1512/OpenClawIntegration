name: Weekday Portfolio Analysis

on:
  schedule:
    # Runs Monday-Friday at 07:00 UTC, which aligns with European market open
    # during summer time and remains in the morning during winter time.
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      run_immediately:
        description: "Run the portfolio analysis immediately (one-shot mode)"
        required: false
        default: "true"

jobs:
  run-portfolio-analysis:
    name: Run Portfolio Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Load portfolio prompt from file
        run: |
          {
            echo "PORTFOLIO_PROMPT<<PROMPT_EOF"
            cat prompts/stock-portfolio-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_ENV"

      - name: Validate Copilot API access
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          COPILOT_MODEL: gpt-5
          COPILOT_API_URL: ${{ vars.COPILOT_API_URL || 'https://models.inference.ai.azure.com' }}
        run: |
          set -euo pipefail

          if [ -z "${COPILOT_TOKEN}" ]; then
            echo "COPILOT_TOKEN is not configured."
            exit 1
          fi

          echo "--- Models available for this token ---"
          curl -sS \
            "${COPILOT_API_URL%/}/models" \
            -H "Authorization: Bearer ${COPILOT_TOKEN}" | \
            jq -r '(.data // .) | .[] | .id' 2>/dev/null || true
          echo "---"

          response_file="$(mktemp)"
          payload_file="$(mktemp)"
          trap 'rm -f "${response_file}" "${payload_file}"' EXIT

          cat > "${payload_file}" <<EOF
          {
            "model": "${COPILOT_MODEL}",
            "messages": [
              {
                "role": "user",
                "content": "Reply with exactly: Copilot pipeline auth OK"
              }
            ],
            "max_completion_tokens": 32
          }
          EOF

          http_code="$(
            curl -sS \
              -o "${response_file}" \
              -w "%{http_code}" \
              -X POST "${COPILOT_API_URL%/}/chat/completions" \
              -H "Authorization: Bearer ${COPILOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Copilot-Integration-Id: copilot-daily-digest-ci" \
              --data-binary "@${payload_file}"
          )"

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "Copilot API preflight failed with HTTP ${http_code}."
            cat "${response_file}"
            exit 1
          fi

          echo "Copilot API preflight succeeded with HTTP ${http_code}."
          head -c 400 "${response_file}"
          echo

      - name: Run portfolio analysis (one-shot)
        env:
          # GitHub Copilot token
          CopilotDigest__Copilot__Token: ${{ secrets.COPILOT_TOKEN }}
          # gpt-5.5 has a 1M token context window, suitable for large enriched prompts
          CopilotDigest__Copilot__Model: ${{ vars.COPILOT_MODEL || 'gpt-5.5' }}
          # Higher token limit for detailed per-position breakdowns
          CopilotDigest__Copilot__MaxTokens: ${{ vars.COPILOT_MAX_TOKENS || '4000' }}
          # Email / SMTP notification settings
          CopilotDigest__Email__SmtpHost: ${{ secrets.SMTP_HOST }}
          CopilotDigest__Email__SmtpPort: ${{ vars.SMTP_PORT || '587' }}
          CopilotDigest__Email__Username: ${{ secrets.SMTP_USERNAME }}
          CopilotDigest__Email__Password: ${{ secrets.SMTP_PASSWORD }}
          CopilotDigest__Email__FromAddress: ${{ secrets.EMAIL_FROM_ADDRESS }}
          CopilotDigest__Email__ToAddress: ${{ secrets.EMAIL_TO_ADDRESS }}
          # Single topic: the full portfolio analysis prompt
          CopilotDigest__Topics__0__Name: "Portfolio Analysis"
        run: |
          export CopilotDigest__Topics__0__Prompt="$PORTFOLIO_PROMPT"
          dotnet run \
            --project src/CopilotDigest/CopilotDigest.csproj \
            --configuration Release \
            --no-build \
            -- --run-once
