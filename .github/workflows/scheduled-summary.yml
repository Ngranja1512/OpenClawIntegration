name: Daily Summary

on:
  schedule:
    # Runs every day at 08:00 UTC. Adjust the cron expression as needed.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      run_immediately:
        description: "Run the summary cycle immediately (one-shot mode)"
        required: false
        default: "true"

jobs:
  run-summary:
    name: Run CopilotDigest Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Load topic prompts from files
        run: |
          {
            echo "TOPIC_0_PROMPT<<PROMPT_EOF"
            cat prompts/ai-news-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_ENV"

      - name: Run summary (one-shot)
        # The app reads config from environment variables using the standard
        # .NET environment-variable configuration provider.
        # Each secret/variable maps to the corresponding appsettings key under
        # the "CopilotDigest" section (see AppSettings).
        env:
          # GitHub Copilot token
          CopilotDigest__Copilot__Token: ${{ secrets.COPILOT_TOKEN }}
          # Optional overrides for Copilot API settings
          CopilotDigest__Copilot__Model: ${{ vars.COPILOT_MODEL || 'gpt-4.1' }}
          CopilotDigest__Copilot__MaxTokens: ${{ vars.COPILOT_MAX_TOKENS || '2000' }}
          # Email / SMTP notification settings
          CopilotDigest__Email__SmtpHost: ${{ secrets.SMTP_HOST }}
          CopilotDigest__Email__SmtpPort: ${{ vars.SMTP_PORT || '587' }}
          CopilotDigest__Email__Username: ${{ secrets.SMTP_USERNAME }}
          CopilotDigest__Email__Password: ${{ secrets.SMTP_PASSWORD }}
          CopilotDigest__Email__FromAddress: ${{ secrets.EMAIL_FROM_ADDRESS }}
          CopilotDigest__Email__ToAddress: ${{ secrets.EMAIL_TO_ADDRESS }}
          # Scheduler cron expression (UTC, 5-part)
          CopilotDigest__Scheduler__CronExpression: ${{ vars.SCHEDULER_CRON || '0 8 * * *' }}
          # Topics to summarise (add more pairs as needed)
          CopilotDigest__Topics__0__Name: ${{ vars.TOPIC_0_NAME || 'AI Industry News' }}
          CopilotDigest__Topics__0__Prompt: ${{ env.TOPIC_0_PROMPT }}
          CopilotDigest__Topics__1__Name: ${{ vars.TOPIC_1_NAME }}
          CopilotDigest__Topics__1__Description: ${{ vars.TOPIC_1_DESCRIPTION }}
        run: |
          dotnet run \
            --project src/CopilotDigest/CopilotDigest.csproj \
            --configuration Release \
            --no-build \
            -- --run-once
